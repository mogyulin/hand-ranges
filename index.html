<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUNA Hacker - Poker Range v2</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --text-color: #e2e8f0;
            --primary: #8b5cf6;
            
            /* カラー定義（グラデーションやストライプにする場合はJS側で制御） */
            --color-fold: #334155;
            --color-fold-call: #475569; /* 混合用暫定 */
            --color-call: #10b981;
            --color-call-3b: #0ea5e9;
            --color-3b: #3b82f6;
            --color-3b-bluff: #a855f7;
            --color-call-4b: #f59e0b;
            --color-4b: #ef4444;
            --color-4b-bluff: #ec4899;
            --color-call-5b: #f97316;
            --color-5b: #dc2626;
            --color-allin: #b91c1c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 10px; min-height: 100vh; display: flex; flex-direction: column; }
        h1 { font-size: 1.2rem; text-align: center; margin-bottom: 10px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        
        .selector-container { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; background: var(--card-bg); padding: 10px; border-radius: 8px; }
        .row { display: flex; align-items: center; gap: 10px; }
        .row-label { font-size: 0.8rem; font-weight: bold; width: 80px; color: #94a3b8; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; flex: 1; }
        button { background: #2d2d39; color: #94a3b8; border: none; padding: 6px 12px; font-size: 0.8rem; font-weight: bold; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        button.active { background: var(--primary); color: #fff; }

        /* 凡例エリア */
        .legend { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; font-size: 0.75rem; background: #1a1a20; padding: 8px; border-radius: 6px; }
        .legend-item { display: flex; align-items: center; gap: 4px; display: none; }
        .dot { width: 12px; height: 12px; border-radius: 2px; }

        .grid-container { display: flex; justify-content: center; align-items: center; flex: 1; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 1px; width: 100%; max-width: 400px; aspect-ratio: 1; background: #2d2d39; border: 1px solid #2d2d39; }
        .cell { display: flex; justify-content: center; align-items: center; font-size: 0.6rem; font-weight: bold; color: #fff; background: var(--color-fold); aspect-ratio: 1; border-radius: 1px; text-shadow: 1px 1px 1px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <h1>LUNA Hacker Range</h1>

    <div class="selector-container">
        <!-- シチュエーション（日本語化） -->
        <div class="row">
            <div class="row-label">状況</div>
            <div class="btn-group" id="situation-group">
                <button class="active" onclick="changeSituation('open')">OPEN</button>
                <button onclick="changeSituation('vsOpen')">対OPEN</button>
                <button onclick="changeSituation('vs3bet')">対3BET</button>
                <button onclick="changeSituation('vs4bet')">対4BET</button>
            </div>
        </div>
        <div id="dynamic-selectors"></div>
    </div>

    <!-- 動的凡例（状況に応じてJavaScriptで出し分け） -->
    <div class="legend" id="legend-container"></div>

    <div class="grid-container">
        <div class="grid" id="matrix"></div>
    </div>

    <script>
        const ranks = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
        const cells = [];
        let rangeData = {}; // JSONから読み込む用

        // 全全ハンド生成
        for (let r = 0; r < 13; r++) {
            for (let c = 0; c < 13; c++) {
                if (r < c) cells.push(ranks[r] + ranks[c] + 's');
                else if (r > c) cells.push(ranks[c] + ranks[r] + 'o');
                else cells.push(ranks[r] + ranks[c]);
            }
        }

        // アクションごとのカラーマップと日本語ラベル
        const actionConfigs = {
            'F':   { color: 'var(--color-fold)', label: 'フォールド' },
            'O':   { color: 'var(--color-4b)', label: 'オープン' }, // OPEN時は一色
            'FC':  { color: 'linear-gradient(135deg, var(--color-fold) 50%, var(--color-call) 50%)', label: 'フォールドorコール' },
            'C':   { color: 'var(--color-call)', label: 'コール' },
            'C3':  { color: 'linear-gradient(135deg, var(--color-call) 50%, var(--color-3b) 50%)', label: 'コールor3BET' },
            '3B':  { color: 'var(--color-3b)', label: '3BET' },
            'B3':  { color: 'var(--color-3b-bluff)', label: 'ブラフ3BET' },
            'C4':  { color: 'linear-gradient(135deg, var(--color-call) 50%, var(--color-4b) 50%)', label: 'コールor4BET' },
            '4B':  { color: 'var(--color-4b)', label: '4BET' },
            'B4':  { color: 'var(--color-4b-bluff)', label: 'ブラフ4BET' },
            'C5':  { color: 'linear-gradient(135deg, var(--color-call) 50%, var(--color-5b) 50%)', label: 'コールor5BET' },
            '5B':  { color: 'var(--color-5b)', label: '5BET' },
            'AI':  { color: 'var(--color-allin)', label: 'オールイン' }
        };

        // 各シチュエーションで表示する凡例のグループ
        const legendGroups = {
            open: ['F', 'O'],
            vsOpen: ['F', 'C', 'C3', '3B', 'B3'],
            vs3bet: ['F', 'FC', 'C', 'C4', '4B', 'B4'],
            vs4bet: ['F', 'C', 'C5', '5B', 'AI']
        };

        let currentSit = 'open';
        let myPos = 'UTG';
        let oppPos = 'HJ';

        // 外部JSONの読み込み
        async function loadRanges() {
            try {
                const response = await fetch('ranges.json');
                rangeData = await response.json();
                init();
            } catch (error) {
                console.error("レンジデータの読み込みに失敗しました:", error);
                // 落ちた場合のモック
                rangeData = { open: {}, vsOpen: {}, vs3bet: {}, vs4bet: {} };
                init();
            }
        }

        function init() {
            const grid = document.getElementById('matrix');
            grid.innerHTML = '';
            cells.forEach(hand => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = 'hand-' + hand;
                cell.innerText = hand;
                grid.appendChild(cell);
            });
            changeSituation('open');
        }

        function changeSituation(sit) {
            currentSit = sit;
            // 初期ポジション調整
            if (sit === 'open') { myPos = 'UTG'; }
            else if (sit === 'vsOpen') { oppPos = 'UTG'; myPos = 'HJ'; }
            else { oppPos = 'HJ'; myPos = 'UTG'; } // vs3b, vs4b

            renderSelectors();
            renderLegend();
            updateDisplay();
        }

        function renderSelectors() {
            const container = document.getElementById('dynamic-selectors');
            container.innerHTML = '';

            const myRow = `<div class="row"><div class="row-label">自分の位置</div><div class="btn-group" id="mypos-group"></div></div>`;
            const oppRow = `<div class="row"><div class="row-label">相手の位置</div><div class="btn-group" id="oppos-group"></div></div>`;

            if (currentSit === 'open') {
                container.innerHTML = myRow;
            } else if (currentSit === 'vsOpen') {
                container.innerHTML = oppRow + myRow; // 相手が先、自分が後
            } else {
                container.innerHTML = oppRow + myRow; // vs3b, vs4b も同様
            }

            buildButtons();
        }

        function buildButtons() {
            const allPos = ['UTG', 'HJ', 'CO', 'BTN', 'SB', 'BB'];
            
            // 相手ポジションのビルド
            const oppGroup = document.getElementById('oppos-group');
            if (oppGroup) {
                let allowedOpp = [...allPos];
                if (currentSit === 'vs4bet') allowedOpp = ['UTG', 'HJ', 'CO', 'BTN', 'SB']; // BBは4Bオープンしない
                
                allowedOpp.forEach(pos => {
                    const btn = document.createElement('button');
                    btn.innerText = pos;
                    btn.className = (pos === oppPos) ? 'active' : '';
                    btn.onclick = () => { oppPos = pos; adjustPositions(); };
                    oppGroup.appendChild(btn);
                });
            }

            // 自分ポジションのビルド
            const myGroup = document.getElementById('mypos-group');
            if (myGroup) {
                let allowedMy = [...allPos];
                if (currentSit === 'open') allowedMy = ['UTG', 'HJ', 'CO', 'BTN', 'SB']; // BBはオープンなし
                else {
                    // 自分と相手が被らないようにフィルター
                    allowedMy = allPos.filter(p => p !== oppPos);
                }

                allowedMy.forEach(pos => {
                    const btn = document.createElement('button');
                    btn.innerText = pos;
                    btn.className = (pos === myPos) ? 'active' : '';
                    btn.onclick = () => { myPos = pos; adjustPositions(); };
                    myGroup.appendChild(btn);
                });
            }
        }

        function adjustPositions() {
            // シチュエーションボタンの活性化
            document.querySelectorAll('#situation-group button').forEach(b => {
                b.classList.toggle('active', b.getAttribute('onclick').includes(`'${currentSit}'`));
            });
            renderSelectors();
            updateDisplay();
        }

        function renderLegend() {
            const container = document.getElementById('legend-container');
            container.innerHTML = '';
            const activeActions = legendGroups[currentSit];
            
            activeActions.forEach(act => {
                const config = actionConfigs[act];
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.style.display = 'flex';
                
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.style.background = config.color;
                
                const text = document.createElement('span');
                text.innerText = config.label;
                
                item.appendChild(dot);
                item.appendChild(text);
                container.appendChild(item);
            });
        }

        function updateDisplay() {
            // 一旦全員フォールド色にリセット
            cells.forEach(hand => {
                const el = document.getElementById('hand-' + hand);
                if (el) el.style.background = varColor('F');
            });

            if (!rangeData[currentSit]) return;

            let dataNode = {};
            if (currentSit === 'open') {
                dataNode = rangeData.open[myPos] || {};
            } else {
                // 対系は "相手_自分" または "自分_相手" のキー構造にJSON側で合わせる
                // ここでは一律で `相手_自分` (例: UTGがオープンしてHJが返す = UTG_HJ)
                // vs3betなら、HJがオープンしてSBが3BしたのにHJが返す = HJ_SB
                const key = `${oppPos}_${myPos}`;
                dataNode = rangeData[currentSit][key] || {};
            }

            // 各ハンドの色を適用
            Object.keys(dataNode).forEach(hand => {
                const actionCode = dataNode[hand];
                const el = document.getElementById('hand-' + hand);
                if (el && actionConfigs[actionCode]) {
                    el.style.background = actionConfigs[actionCode].color;
                }
            });
        }

        function varColor(code) {
            return actionConfigs[code].color;
        }

        // 起動
        loadRanges();
    </script>
</body>
</html>
