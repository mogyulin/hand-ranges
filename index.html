<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUNA Hacker - Poker Range</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --text-color: #e2e8f0;
            --primary: #8b5cf6;
            --fold: #334155;
            --call: #10b981;
            --raise: #ef4444;
            --allin: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 10px; min-height: 100vh; display: flex; flex-direction: column; }
        h1 { font-size: 1.2rem; text-align: center; margin-bottom: 10px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        
        /* セレクターエリア */
        .selector-container { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; background: var(--card-bg); padding: 10px; border-radius: 8px; }
        .row { display: flex; align-items: center; gap: 10px; }
        .row-label { font-size: 0.8rem; font-weight: bold; width: 60px; color: #94a3b8; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; flex: 1; }
        button { background: #2d2d39; color: #94a3b8; border: none; padding: 6px 12px; font-size: 0.8rem; font-weight: bold; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        button.active { background: var(--primary); color: #fff; }

        /* 凡例 */
        .legend { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; font-size: 0.75rem; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .dot { width: 12px; height: 12px; border-radius: 2px; }

        /* 13x13 グリッド */
        .grid-container { display: flex; justify-content: center; align-items: center; flex: 1; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 1px; width: 100%; max-width: 400px; aspect-ratio: 1; background: #2d2d39; border: 1px solid #2d2d39; }
        .cell { display: flex; justify-content: center; align-items: center; font-size: 0.6rem; font-weight: bold; color: #fff; background: var(--fold); aspect-ratio: 1; border-radius: 1px; text-shadow: 1px 1px 1px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <h1>LUNA Hacker Range</h1>

    <div class="selector-container">
        <!-- ① シチュエーション選択 -->
        <div class="row">
            <div class="row-label">SITUATION</div>
            <div class="btn-group" id="situation-group">
                <button class="active" onclick="setSituation('open')">OPEN</button>
                <button onclick="setSituation('threeBet')">3-BET</button>
                <button onclick="setSituation('vs3bet')">Vs 3-BET</button>
                <button onclick="setSituation('vs4bet')">Vs 4-BET</button>
            </div>
        </div>

        <!-- ② 3-BETの時だけ、相手のポジション（起点）を上に持ってくる -->
        <div id="dynamic-selectors">
            <!-- JSで上下の並びを動的に入れ替えます -->
        </div>
    </div>

    <!-- 凡例 -->
    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:var(--fold)"></div>Fold/Pure</div>
        <div class="legend-item" id="leg-call"><div class="dot" style="background:var(--call)"></div>Call</div>
        <div class="legend-item" id="leg-raise"><div class="dot" style="background:var(--raise)"></div>Open</div>
        <div class="legend-item" id="leg-allin" style="display:none;"><div class="dot" style="background:var(--allin)"></div>5B All-in</div>
    </div>

    <!-- グリッド表示 -->
    <div class="grid-container">
        <div class="grid" id="matrix"></div>
    </div>

    <script>
        const ranks = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
        const matrixCells = [];
        for (let r = 0; r < 13; r++) {
            for (let c = 0; c < 13; c++) {
                if (r < c) matrixCells.push(ranks[r] + ranks[c] + 's');
                else if (r > c) matrixCells.push(ranks[c] + ranks[r] + 'o');
                else matrixCells.push(ranks[r] + ranks[c]);
            }
        }

        let currentSituation = 'open';
        let currentMyPos = 'UTG';
        let currentOpPos = 'HJ';

        const rangeData = {
            open: {
                UTG: ['AA','KK','QQ','JJ','TT','99','88','77','AKs','AQs','AJs','ATs','A5s','A4s','A3s','KQs','KJs','KTs','QJs','QTs','JTs','T9s','98s','AKo','AQo'],
                HJ: ['AA','KK','QQ','JJ','TT','99','88','77','66','55','AKs','AQs','AJs','ATs','A9s','A8s','A5s','A4s','A3s','A2s','KQs','KJs','KTs','K9s','QJs','QTs','Q9s','JTs','J9s','T9s','98s','87s','AKo','AQo','KQo'],
                CO: ['AA','KK','QQ','JJ','TT','99','88','77','66','55','44','33','22','AKs','AQs','AJs','ATs','A9s','A8s','A7s','A6s','A5s','A4s','A3s','A2s','KQs','KJs','KTs','K9s','K8s','QJs','QTs','Q9s','JTs','J9s','T9s','T8s','98s','97s','87s','76s','65s','AKo','AQo','KQo','AJo','KJo','QJo'],
                BTN: ['AA','KK','QQ','JJ','TT','99','88','77','66','55','44','33','22','AKs','AQs','AJs','ATs','A9s','A8s','A7s','A6s','A5s','A4s','A3s','A2s','KQs','KJs','KTs','K9s','K8s','K7s','K6s','K6s','K5s','K4s','K3s','K2s','QJs','QTs','Q9s','Q8s','Q7s','Q6s','JTs','J9s','J8s','J7s','T9s','T8s','T7s','98s','97s','87s','86s','76s','75s','65s','64s','54s','53s','43s','AKo','AQo','KQo','AJo','KJo','QJo','ATo','KTo','QTo','JTo'],
                SB: ['AA','KK','QQ','JJ','TT','99','88','77','66','55','44','AKs','AQs','AJs','ATs','A9s','A8s','A7s','A6s','A5s','A4s','A2s','KQs','KJs','KTs','K9s','K8s','QJs','QTs','Q9s','JTs','J9s','T9s','T8s','98s','87s','76s','65s','AKo','AQo','KQo','AJo','KJo','QJo','ATo','KTo','QTo']
            },
            threeBet: {
                'UTG_HJ':  { call: ['QQ','JJ','TT','99','88','77','AQs','AQo','KQs','QJs','JTs'], raise: ['AA','KK','AKs','AKo','A5s','A4s'], allin: [] },
                'UTG_CO':  { call: ['QQ','JJ','TT','99','88','77','AQs','AQo','KQs','KJs','QJs','JTs'], raise: ['AA','KK','AKs','AKo','A5s','A4s'], allin: [] },
                'UTG_BTN': { call: ['TT','99','88','77','66','KQs','KJs','QJs','JTs','AQo'],       raise: ['AA','KK','QQ','JJ','AKs','AQs','AKo','A5s','A4s','A3s','A2s','T9s','98s'], allin: [] },
                'UTG_SB':  { call: [], raise: ['AA','KK','QQ','JJ','TT','AKs','AQs','KQs','KJs','QJs','AKo','AQo','A5s','A4s','A3s','A2s'], allin: [] },
                'UTG_BB':  { call: ['JJ','TT','99','88','77','66','55','44','33','22','AQs','AJs','ATs','KQs','KJs','KTs','QJs','JTs','T9s','98s','87s','76s','AQo'], raise: ['AA','KK','QQ','AKs','AKo','A5s','A4s','A3s','A2s','K9s','Q9s','J9s'], allin: [] },
                'HJ_CO':   { call: ['JJ','TT','99','88','77','AQs','KQs','KJs','QJs','JTs','AQo'], raise: ['AA','KK','QQ','AKs','AKo','A5s','A4s','A3s'], allin: [] },
                'HJ_BTN':  { call: ['TT','99','88','77','66','KQs','KJs','QJs','JTs','AQo','KQo'], raise: ['AA','KK','QQ','JJ','AKs','AQs','AJs','AKo','A5s','A4s','A3s','A2s','T9s','98s'], allin: [] },
                'HJ_SB':   { call: [], raise: ['AA','KK','QQ','JJ','TT','99','AKs','AQs','AJs','KQs','KJs','QJs','JTs','AKo','AQo','A5s','A4s','A3s'], allin: [] },
                'HJ_BB':   { call: ['TT','99','88','77','66','55','44','33','22','AQs','AJs','ATs','A9s','KQs','KJs','KTs','QJs','QTs','JTs','J9s','T9s','98s','87s','76s','65s','AQo','KQo'], raise: ['AA','KK','QQ','JJ','AKs','AQs','AKo','A5s','A4s','A3s','A2s','K9s','Q9s'], allin: [] },
                'CO_BTN':  { call: ['99','88','77','66','55','KQs','KJs','KTs','QJs','QTs','JTs','AQo','KQo'], raise: ['AA','KK','QQ','JJ','TT','AKs','AQs','AJs','ATs','AKo','A5s','A4s','A3s','A2s','T9s','98s','87s'], allin: [] },
                'CO_SB':   { call: [], raise: ['AA','KK','QQ','JJ','TT','99','88','AKs','AQs','AJs','ATs','KQs','KJs','K9s','QJs','QTs','JTs','AKo','AQo','A5s','A4s','A3s'], allin: [] },
                'CO_BB':   { call: ['99','88','77','66','55','44','33','22','AQs','AJs','ATs','A9s','A8s','KQs','KJs','KTs','QJs','QTs','JTs','T9s','T8s','98s','97s','87s','76s','65s','AQo','KQo','AJo','KJo','QJo'], raise: ['AA','KK','QQ','JJ','TT','AKs','AQs','AJs','AKo','A5s','A4s','A3s','A2s','K9s','Q9s','J9s','T9s'], allin: [] },
                'BTN_SB':  { call: [], raise: ['AA','KK','QQ','JJ','TT','99','88','77','66','AKs','AQs','AJs','ATs','A9s','KQs','KJs','KTs','QJs','QTs','JTs','AKo','AQo','KQo','AJo','A5s','A4s','A3s','A2s','K9s','Q9s','J9s','T9s'], allin: [] },
                'BTN_BB':  { call: ['88','77','66','55','44','33','22','AJs','ATs','A9s','A8s','A7s','KQs','KJs','KTs','K9s','QJs','QTs','Q9s','JTs','J9s','T9s','T8s','98s','97s','87s','86s','76s','65s','54s','AQo','KQo','AJo','KJo','QJo','ATo','KTo','QTo','JTo'], raise: ['AA','KK','QQ','JJ','TT','99','AKs','AQs','AKo','A5s','A4s','A3s','A2s','K8s','K7s','Q8s','J8s','T7s','96s','85s','74s','64s','53s'], allin: [] },
                'SB_BB':   { call: ['TT','99','88','77','66','55','44','33','22','AJs','ATs','A9s','A8s','A7s','A6s','KQs','KJs','KTs','K9s','K8s','QJs','QTs','Q9s','JTs','J9s','T9s','T8s','98s','97s','87s','86s','76s','75s','65s','64s','54s','53s','43s','AQo','KQo','AJo','KJo','QJo','ATo','KTo','QTo','JTo'], raise: ['AA','KK','QQ','JJ','AKs','AQs','AKo','A5s','A4s','A3s','A2s','K7s','K6s','Q8s','J8s','T7s','96s','85s'], allin: [] }
            },
            vs3bet: {
                'UTG_HJ':  { call: ['QQ','JJ','TT','AQs','KQs','AKo'], raise: ['AA','KK','AKs','A5s'], allin: [] },
                'UTG_CO':  { call: ['QQ','JJ','TT','AQs','KQs','AKo'], raise: ['AA','KK','AKs','A5s'], allin: [] },
                'UTG_BTN': { call: ['QQ','JJ','TT','AQs','KQs','AKo'], raise: ['AA','KK','AKs','A5s'], allin: [] },
                'UTG_SB':  { call: ['QQ','JJ','TT','AQs','AKo'],       raise: ['AA','KK','AKs'],       allin: [] },
                'UTG_BB':  { call: ['QQ','JJ','TT','AQs','AKo'],       raise: ['AA','KK','AKs'],       allin: [] },
                'HJ_UTG':  { call: ['QQ','JJ','TT','AQs'],             raise: ['AA','KK','AKs'],       allin: [] },
                'HJ_CO':   { call: ['QQ','JJ','TT','AQs','KQs','AKo'], raise: ['AA(--cite--): []','KK','AKs','A5s'], allin: [] },
                'HJ_BTN':  { call: ['QQ','JJ','TT','AQs','KQs','AKo'], raise: ['AA','KK','AKs','A5s'], allin: [] },
                'HJ_SB':   { call: ['QQ','JJ','TT','AQs','KQs','AKo'], raise: ['AA','KK','AKs','A4s'], allin: [] },
                'HJ_BB':   { call: ['QQ','JJ','TT','AQs','KQs','AKo'], raise: ['AA','KK','AKs','A4s'], allin: [] },
                'CO_UTG':  { call: ['QQ','JJ','AQs'],                   raise: ['AA','KK','AKs'],       allin: [] },
                'CO_HJ':   { call: ['QQ','JJ','TT','AQs','KQs'],       raise: ['AA','KK','AKs','A5s'], allin: [] },
                'CO_BTN':  { call: ['QQ','JJ','TT','99','AQs','KQs','JTs','AKo'], raise: ['AA','KK','AKs','A5s','A4s'], allin: [] },
                'CO_SB':   { call: ['QQ','JJ','TT','AQs','KQs','AKo'], raise: ['AA','KK','AKs','A5s','A4s'], allin: [] },
                'CO_BB':   { call: ['QQ','JJ','TT','AQs','KQs','AKo'], raise: ['AA','KK','AKs','A5s','A4s'], allin: [] },
                'BTN_UTG': { call: ['QQ','JJ','AQs'],                   raise: ['AA','KK','AKs'],       allin: [] },
                'BTN_HJ':  { call: ['QQ','JJ','AQs','KQs'],             raise: ['AA','KK','AKs','A5s'], allin: [] },
                'BTN_CO':  { call: ['QQ','JJ','TT','AQs','KQs','JTs'], raise: ['AA','KK','AKs','A5s','A4s'], allin: [] },
                'BTN_SB':  { call: ['QQ','JJ','TT','99','88','AQs','AJs','KQs','KJs','QJs','JTs','T9s','AKo','AQo'], raise: ['AA','KK','AKs','A5s','A4s','A3s','A2s'], allin: [] },
                'BTN_BB':  { call: ['QQ','JJ','TT','99','88','AQs','AJs','KQs','KJs','QJs','JTs','T9s','AKo','AQo'], raise: ['AA','KK','AKs','A5s','A4s','A3s','A2s'], allin: [] },
                'SB_UTG':  { call: ['QQ','AQs'],                       raise: ['AA','KK','AKs'],       allin: [] },
                'SB_HJ':   { call: ['QQ','JJ','AQs'],                   raise: ['AA','KK','AKs'],       allin: [] },
                'SB_CO':   { call: ['QQ','JJ','TT','AQs','KQs'],       raise: ['AA','KK','AKs','A5s'], allin: [] },
                'SB_BTN':  { call: ['QQ','JJ','TT','99','AQs','KQs'],   raise: ['AA','KK','AKs','A5s','A4s'], allin: [] },
                'SB_BB':   { call: ['QQ','JJ','TT','99','88','77','AQs','AJs','ATs','KQs','KJs','QJs','JTs','AKo','AQo'], raise: ['AA','KK','QQ','AKs','A5s','A4s','A3s'], allin: [] }
            },
            vs4bet: {
                'HJ_UTG':  { call: ['KK','QQ','AKs'],                 raise: [],                      allin: ['AA'] },
                'CO_UTG':  { call: ['KK','QQ','AKs'],                 raise: [],                      allin: ['AA'] },
                'CO_HJ':   { call: ['KK','QQ','JJ','AKs'],             raise: [],                      allin: ['AA'] },
                'BTN_UTG': { call: ['KK','AKs'],                      raise: [],                      allin: ['AA'] },
                'BTN_HJ':  { call: ['KK','QQ','AKs'],                 raise: [],                      allin: ['AA'] },
                'BTN_CO':  { call: ['KK','QQ','JJ','AKs','AQs'],       raise: [],                      allin: ['AA','A5s'] },
                'SB_UTG':  { call: ['KK','AKs'],                      raise: [],                      allin: ['AA'] },
                'SB_HJ':   { call: ['KK','QQ','AKs'],                 raise: [],                      allin: ['AA'] },
                'SB_CO':   { call: ['KK','QQ','JJ','AKs'],             raise: [],                      allin: ['AA'] },
                'SB_BTN':  { call: ['KK','QQ','JJ','TT','AKs','AQs','KQs','AKo'], raise: [],          allin: ['AA','A5s','A4s'] },
                'BB_UTG':  { call: ['KK','AKs'],                      raise: [],                      allin: ['AA'] },
                'BB_HJ':   { call: ['KK','QQ','AKs'],                 raise: [],                      allin: ['AA'] },
                'BB_CO':   { call: ['KK','QQ','JJ','AKs'],             raise: [],                      allin: ['AA'] },
                'BB_BTN':  { call: ['KK','QQ','JJ','TT','AKs','AQs','KQs','AKo'], raise: [],          allin: ['AA','A5s','A4s'] },
                'BB_SB':   { call: ['KK','QQ','JJ','TT','AKs','AQs','KQs','AKo'], raise: [],          allin: ['AA','A5s'] }
            }
        };

        function renderSelectors() {
            const container = document.getElementById('dynamic-selectors');
            container.innerHTML = '';

            const myPosRow = `
                <div class="row">
                    <div class="row-label">MY POS</div>
                    <div class="btn-group" id="mypos-group">
                        <button onclick="setMyPos('UTG')">UTG</button>
                        <button onclick="setMyPos('HJ')">HJ</button>
                        <button onclick="setMyPos('CO')">CO</button>
                        <button onclick="setMyPos('BTN')">BTN</button>
                        <button onclick="setMyPos('SB')">SB</button>
                        <button id="mypos-bb" onclick="setMyPos('BB')">BB</button>
                    </div>
                </div>`;

            const oppPosRow = `
                <div class="row" id="oppositon-row">
                    <div class="row-label">OPP POS</div>
                    <div class="btn-group" id="oppos-group"></div>
                </div>`;

            // 3-BETの時だけOPP POS（相手）を上に配置
            if (currentSituation === 'threeBet') {
                container.innerHTML = oppPosRow + myPosRow;
            } else {
                container.innerHTML = myPosRow + oppPosRow;
            }

            // 初期状態のアクティブ化
            updateButtonsUI();
        }

        function initGrid() {
            const grid = document.getElementById('matrix');
            grid.innerHTML = '';
            matrixCells.forEach(hand => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = 'hand-' + hand;
                cell.innerText = hand;
                grid.appendChild(cell);
            });
            renderSelectors();
            updateDisplay();
        }

        function setSituation(sit) {
            currentSituation = sit;
            
            // デフォルトの初期位置調整
            if (sit === 'open') {
                if (currentMyPos === 'BB') currentMyPos = 'UTG';
            } else if (sit === 'threeBet') {
                currentOpPos = 'UTG';
                currentMyPos = 'HJ';
            } else {
                if (currentMyPos === 'BB') currentMyPos = 'UTG';
                currentOpPos = (currentMyPos === 'UTG') ? 'HJ' : 'UTG';
            }

            // セレクターの並び順を再レンダリング
            renderSelectors();

            const oppRow = document.getElementById('oppositon-row');
            const legRaise = document.getElementById('leg-raise');
            const legAllin = document.getElementById('leg-allin');
            const legCall = document.getElementById('leg-call');

            if (sit === 'open') {
                oppRow.style.display = 'none';
                legCall.style.display = 'none';
                legAllin.style.display = 'none';
                legRaise.innerHTML = '<div class="dot" style="background:var(--raise)"></div>Open';
            } else {
                oppRow.style.display = 'flex';
                legCall.style.display = 'flex';
                legAllin.style.display = (sit === 'vs4bet') ? 'flex' : 'none';
                
                if (sit === 'threeBet') {
                    legRaise.innerHTML = '<div class="dot" style="background:var(--raise)"></div>3-Bet';
                } else {
                    legRaise.innerHTML = '<div class="dot" style="background:var(--raise)"></div>4-Bet';
                }
                updateOpponentButtons();
            }
            updateDisplay();
        }

        function setMyPos(pos) {
            currentMyPos = pos;
            if (currentSituation !== 'open') {
                updateOpponentButtons();
            }
            updateButtonsUI();
            updateDisplay();
        }

        function setOpPos(pos) {
            currentOpPos = pos;
            updateButtonsUI();
            updateDisplay();
        }

        function updateOpponentButtons() {
            const container = document.getElementById('oppos-group');
            if (!container) return;
            container.innerHTML = '';
            
            const allPos = ['UTG', 'HJ', 'CO', 'BTN', 'SB', 'BB'];
            let oppPositions = [];

            if (currentSituation === 'threeBet') {
                // 3-BET：相手がオープンできるポジション（BB以外）で、かつ自分より前の席
                const myIdx = allPos.indexOf(currentMyPos);
                oppPositions = allPos.slice(0, myIdx).filter(p => p !== 'BB');
                if (oppPositions.length === 0) oppPositions = ['UTG'];
            } else {
                // Vs 3-Bet / Vs 4-Bet：自分以外の全席
                oppPositions = allPos.filter(p => p !== currentMyPos);
            }

            if (!oppPositions.includes(currentOpPos)) {
                currentOpPos = oppPositions[0];
            }

            oppPositions.forEach(pos => {
                const btn = document.createElement('button');
                btn.innerText = pos;
                btn.onclick = () => setOpPos(pos);
                container.appendChild(btn);
            });
        }

        function updateButtonsUI() {
            // SITUATION
            const sitGroup = document.getElementById('situation-group');
            sitGroup.querySelectorAll('button').forEach(b => {
                b.classList.toggle('active', b.getAttribute('onclick').includes(`'${currentSituation}'`));
            });

            // MY POS
            const myPosGroup = document.getElementById('mypos-group');
            if (myPosGroup) {
                // OPENの時はBBを非表示にする
                const bbBtn = document.getElementById('mypos-bb');
                if (bbBtn) bbBtn.style.display = (currentSituation === 'open') ? 'none' : 'inline-block';

                myPosGroup.querySelectorAll('button').forEach(b => {
                    b.classList.toggle('active', b.getAttribute('onclick').includes(`'${currentMyPos}'`));
                });
            }

            // OPP POS
            const oppGroup = document.getElementById('oppos-group');
            if (oppGroup) {
                oppGroup.querySelectorAll('button').forEach(b => {
                    b.classList.toggle('active', b.innerText === currentOpPos);
                });
            }
        }

        function updateDisplay() {
            matrixCells.forEach(hand => {
                const el = document.getElementById('hand-' + hand);
                el.style.background = 'var(--fold)';
            });

            if (currentSituation === 'open') {
                const hands = rangeData.open[currentMyPos] || [];
                hands.forEach(hand => {
                    const el = document.getElementById('hand-' + hand);
                    if (el) el.style.background = 'var(--raise)';
                });
            } else {
                let key = `${currentMyPos}_${currentOpPos}`;
                if (currentSituation === 'threeBet') {
                    key = `${currentOpPos}_${currentMyPos}`;
                }
                
                const data = rangeData[currentSituation][key] || { call: [], raise: [], allin: [] };

                (data.call || []).forEach(h => { const el = document.getElementById('hand-' + h); if(el) el.style.background = 'var(--call)'; });
                (data.raise || []).forEach(h => { const el = document.getElementById('hand-' + h); if(el) el.style.background = 'var(--raise)'; });
                (data.allin || []).forEach(h => { const el = document.getElementById('hand-' + h); if(el) el.style.background = 'var(--allin)'; });
            }
        }

        initGrid();
