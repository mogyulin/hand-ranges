<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preflop Range Matrix</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2a2a2a;
            --text-color: #ffffff;
            --border-color: #444444;
            /* 凡例コードと一貫性を持たせるため、変数名を修正 */
            --fold: #3a3a3a;
            --open: #ff4d4d;
            --cc: #4da6ff;     /* Callを--ccに統一 */
            --raise3p: #ffaa00;
            --raise3: #ffaa00; /* 3betを共通化 */
            --fold3: #777777;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }

        .control-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            height: fit-content;
        }

        .matrix-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .selector-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        select {
            width: 100%;
            padding: 10px;
            background: #333;
            color: white;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .legend-container {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            margin-right: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(13, 1fr);
            gap: 2px;
            aspect-ratio: 1;
            width: 100%;
        }

        .cell {
            background: var(--fold);
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 500;
            border-radius: 2px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
            border: 1px solid rgba(0,0,0,0.2);
        }

        .cell:hover {
            transform: scale(1.05);
            z-index: 1;
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="control-panel">
        <div class="selector-group">
            <label for="situation-select">Situation</label>
            <select id="situation-select">
                <option value="open">vs Open</option>
                <option value="3bet">vs 3Bet</option>
            </select>
        </div>

        <div class="selector-group">
            <label for="position-select">Hero Position</label>
            <select id="position-select">
                <option value="UTG">UTG</option>
                <option value="HJ">HJ</option>
                <option value="CO">CO</option>
                <option value="BTN">BTN</option>
                <option value="SB">SB</option>
                <option value="BB">BB</option>
            </select>
        </div>

        <div class="legend-container" id="legend-box">
            <!-- 凡例が動的に生成されます -->
        </div>
    </div>

    <div class="matrix-panel">
        <div class="matrix-grid" id="matrix"></div>
    </div>
</div>

<script>
    // テスト用のダミーデータ（混合戦略のパターンテストを含む）
    const ranges = {
        "open": {
            "UTG": { "AA": "O", "KK": "O", "QQ": "O", "AKs": "O", "AQs": "O", "AKo": "O", "A5s": "O:50,F:50" },
            "BTN": { "AA": "O", "KK": "O", "72o": "F", "JTs": "O", "T9s": "O" }
        },
        "3bet": {
            "UTG": { "AA": "R3", "KK": "R3", "QQ": "CC", "AKs": "CC", "AKo": "F3" }
        }
    };

    const RANKS = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];

    // 凡例の定義
    const legends = {
        "open": [
            { code: "O", label: "Open Raise", color: "var(--open)" },
            { code: "F", label: "Fold", color: "var(--fold)" }
        ],
        "3bet": [
            { code: "R3", label: "3Bet / 4Bet Raise", color: "var(--raise3)" },
            { code: "CC", label: "Cold Call", color: "var(--cc)" },
            { code: "F3", label: "Fold vs 3Bet", color: "var(--fold3)" }
        ]
    };

    // ヘルパー関数: アクションコードに対応するカラー変数を返す
    function getLegendColor(code, situation) {
        const currentLegends = legends[situation] || [];
        const found = currentLegends.find(l => l.code === code);
        return found ? found.color : "var(--fold)";
    }

    // 凡例の描画
    function updateLegend() {
        const situation = document.getElementById('situation-select').value;
        const box = document.getElementById('legend-box');
        box.innerHTML = '';

        const list = legends[situation] || [];
        list.forEach(item => {
            const div = document.createElement('div');
            div.className = 'legend-item';
            div.innerHTML = `
                <div class="legend-color" style="background: ${item.color}"></div>
                <span>${item.label}</span>
            `;
            box.appendChild(div);
        });
    }

    // マトリックスの生成
    function createMatrix() {
        const matrix = document.getElementById('matrix');
        matrix.innerHTML = '';

        for (let i = 0; i < 13; i++) {
            for (let j = 0; j < 13; j++) {
                let hand = "";
                if (i < j) {
                    hand = RANKS[i] + RANKS[j] + 's';
                } else if (i > j) {
                    hand = RANKS[j] + RANKS[i] + 'o';
                } else {
                    hand = RANKS[i] + RANKS[j];
                }

                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${hand}`;
                cell.textContent = hand;
                matrix.appendChild(cell);
            }
        }
    }

    // データの適用と色の反映
    function applyRange() {
        const situation = document.getElementById('situation-select').value;
        const position = document.getElementById('position-select').value;

        // 全セルを一旦デフォルト（Fold）の色にリセット
        document.querySelectorAll('.cell').forEach(el => {
            el.style.background = "var(--fold)";
        });

        // 該当するポジションのレンジデータを取得
        const situationData = ranges[situation] || {};
        const posData = situationData[position] || {};

        // レンジデータの適用
        Object.keys(posData).forEach(hand => {
            const el = document.getElementById(`cell-${hand}`);
            if (!el) return;

            const actionStr = posData[hand];

            // 混合戦略の解析 (例: "O:50,F:50")
            if (actionStr.includes(',')) {
                const parts = actionStr.split(',');
                let gradientStr = "linear-gradient(135deg";
                let currentPercent = 0;

                parts.forEach(part => {
                    const [code, pctStr] = part.split(':');
                    const pct = parseInt(pctStr, 10);
                    const color = getLegendColor(code, situation);
                    
                    // グラデーションの色の切れ目をシャープにする指定
                    gradientStr += `, ${color} ${currentPercent}%, ${color} ${currentPercent + pct}%`;
                    currentPercent += pct;
                });
                
                gradientStr += ")";
                el.style.background = gradientStr;
            } else {
                // 単一戦略の場合
                el.style.background = getLegendColor(actionStr, situation);
            }
        });
    }

    // イベントリスナーの設定
    function init() {
        createMatrix();
        updateLegend();
        applyRange();

        document.getElementById('situation-select').addEventListener('change', () => {
            updateLegend();
            applyRange();
        });

        document.getElementById('position-select').addEventListener('change', applyRange);
    }

    window.onload = init;
</script>

</body>
</html>
