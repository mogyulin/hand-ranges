<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUNA Hacker - Postflop Theory</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --text-color: #e2e8f0;
            --primary: #8b5cf6;
            
            /* ハンド・立場別カラー */
            --color-monster: #ef4444; /* 赤 */
            --color-pair: #10b981;    /* 緑 */
            --color-draw: #3b82f6;    /* 青 */
            --color-air: #64748b;     /* グレー */
            --color-def: #f59e0b;     /* オレンジ（ディフェンダー） */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 10px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 1.2rem; text-align: center; margin-bottom: 10px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        
        /* ページナビ */
        .page-nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; width: 100%; max-width: 500px; }
        .nav-btn { display: inline-block; text-align: center; text-decoration: none; background: #252530; color: #94a3b8; border: 1px solid #2d2d39; padding: 6px 16px; font-size: 0.8rem; font-weight: bold; border-radius: 6px; flex: 1; transition: all 0.2s; }
        .nav-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* 条件セレクター */
        .selector-container { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; background: var(--card-bg); padding: 10px; border-radius: 8px; width: 100%; max-width: 500px; }
        .row { display: flex; align-items: center; gap: 10px; }
        .row-label { font-size: 0.8rem; font-weight: bold; width: 70px; color: #94a3b8; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; flex: 1; }
        .selector-container button { background: #2d2d39; color: #94a3b8; border: none; padding: 6px 12px; font-size: 0.8rem; font-weight: bold; border-radius: 4px; cursor: pointer; transition: all 0.2s; flex: 1; text-align: center; min-width: 80px; }
        .selector-container button.active { background: var(--primary); color: #fff; }
        .board-example { font-size: 0.75rem; color: #94a3b8; text-align: center; background: #13131a; padding: 6px; border-radius: 4px; font-family: monospace; line-height: 1.3; }

        /* コンテンツエリア */
        .postflop-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        .section-title { font-size: 0.95rem; font-weight: bold; color: #fff; border-left: 3px solid var(--primary); padding-left: 8px; margin-top: 10px; margin-bottom: 4px; }
        
        .postflop-card { background: var(--card-bg); padding: 12px; border-radius: 8px; border-left: 4px solid #fff; }
        
        /* 左帯カラー */
        .postflop-card.monster { border-left-color: var(--color-monster); }
        .postflop-card.pair { border-left-color: var(--color-pair); }
        .postflop-card.draw { border-left-color: var(--color-draw); }
        .postflop-card.air { border-left-color: var(--color-air); }
        .postflop-card.defender { border-left-color: var(--color-def); }
        
        .postflop-title { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; font-weight: bold; color: #fff; margin-bottom: 8px; }
        .hand-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; color: #fff; font-weight: bold; }
        .monster .hand-badge { background: var(--color-monster); }
        .pair .hand-badge { background: var(--color-pair); }
        .draw .hand-badge { background: var(--color-draw); }
        .air .hand-badge { background: var(--color-air); }
        .defender .hand-badge { background: var(--color-def); color: #121214; }

        /* タイムライン */
        .timeline { display: flex; gap: 6px; margin-bottom: 8px; background: #13131a; padding: 6px; border-radius: 6px; justify-content: space-between; }
        .time-node { flex: 1; display: flex; flex-direction: column; align-items: center; font-size: 0.65rem; }
        .time-label { color: #64748b; font-weight: bold; margin-bottom: 2px; font-size: 0.6rem; }
        .size-val { padding: 3px 4px; border-radius: 4px; font-weight: bold; width: 100%; text-align: center; font-size: 0.7rem; }
        
        /* アクション・サイジング別背景色 */
        .size-fold  { background: rgba(100, 116, 139, 0.2); color: #94a3b8; }
        .size-check { background: rgba(139, 92, 246, 0.2); color: #8b5cf6; }
        .size-s     { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .size-m     { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .size-l     { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .size-ai    { background: rgba(185, 28, 28, 0.2); color: #b91c1c; border: 1px dashed #b91c1c; }
        
        .act-call  { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .act-fold  { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .act-bet   { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }

        .postflop-desc { font-size: 0.75rem; color: #cbd5e1; line-height: 1.4; border-top: 1px solid #2d2d39; padding-top: 6px; margin-top: 4px; }
    </style>
</head>
<body>

    <h1>Postflop Theory</h1>

    <div class="page-nav">
        <a href="index.html" class="nav-btn">プリフロップ</a>
        <a href="postflop.html" class="nav-btn active">ポストフロップ</a>
    </div>

    <div class="selector-container">
        <!-- ポット状況 -->
        <div class="row">
            <div class="row-label">ポット</div>
            <div class="btn-group" id="pot-group">
                <button class="active" onclick="changePot('srp')">通常ポット</button>
                <button onclick="changePot('3bet')">3BETポット</button>
                <button onclick="changePot('4bet')">4BETポット</button>
            </div>
        </div>
        <!-- ボードテクスチャ -->
        <div class="row">
            <div class="row-label">ボード</div>
            <div class="btn-group" id="board-group">
                <button class="active" onclick="changeBoard('dry')">DRY (安全)</button>
                <button onclick="changeBoard('wet')">WET (危険)</button>
                <button onclick="changeBoard('mono')">MONO (特殊)</button>
            </div>
        </div>
        <div class="board-example" id="board-example-text">---</div>
    </div>

    <!-- メイン表示エリア -->
    <div class="postflop-container" id="main-content"></div>

                    ],
                    defender: [
                        { act: "相手の極小20%CB", f: "act-call", fTxt: "AKや上位ペアでCall", t: "size-ai", tTxt: "相手All-inに直面", r: "size-check", rTxt: "Showdown", desc: "4BETポットのコール側は非常に狭いレンジ。相手の20%CBには勝っている可能性のあるペアやAKハイでコール。ターンで相手がオールインしてきたら腹を括る。" },
                        { act: "相手がチェックを選択", f: "size-check", fTxt: "こちらもCheck", t: "size-check", tTxt: "Check維持", r: "size-check", rTxt: "Showdown", desc: "相手がチェックした場合、QQやKKでAハイを警戒してフリーズしているかブラフ失敗。こちらも無理に打たずチェックで安く回してショーダウンを目指す。" }
                    ]

                wet: {

                    aggressor: [
                        { rank: "monster", title: "① モンスター (セット/ストレート/最強2ペア)", flop: "size-ai", flopTxt: "即All-in (100%)", turn: "size-ai", turnTxt: "All-in", river: "size-ai", riverTxt: "All-in", desc: "ターンで状況がグチャグチャになる前に、フロップの時点でスタックのすべてを中央に叩き込む（即オールイン）。" },

                        { act: "全体方針", f: "size-check", fTxt: "完全Check引きこもり", t: "size-check", tTxt: "Checkのみ", r: "act-fold", rTxt: "打たれたらFold", desc: "4BETかつMONOボードは誰もまともにヒットしていません。「A♣」を自分が持っていない限りは完全チェック。相手からオールインが飛んできたら即フォールド。" }

        let currentPot = 'srp';
        let currentBoard = 'dry';

        function changePot(potType) {
            currentPot = potType;
            document.querySelectorAll('#pot-group button').forEach(b => {
                const onclickText = b.getAttribute('onclick');
                b.classList.toggle('active', onclickText.includes(`'${potType}'`));
            });
            updateDisplay();
        }

        function changeBoard(boardType) {
            currentBoard = boardType;
            document.querySelectorAll('#board-group button').forEach(b => {
                const onclickText = b.getAttribute('onclick');
                b.classList.toggle('active', onclickText.includes(`'${boardType}'`));
            });
            updateDisplay();
        }

        function updateDisplay() {
            const data = theoryData[currentPot][currentBoard];
            document.getElementById('board-example-text').innerHTML = data.example;

            const container = document.getElementById('main-content');
            container.innerHTML = '';

            // 1. アグレッサーセクション
            const aggTitle = document.createElement('div');
            aggTitle.className = 'section-title';
            aggTitle.innerText = '⚔️ アグレッサー側（主導権あり / 最後にレイズした側）';
            container.appendChild(aggTitle);

            data.aggressor.forEach(c => {
                const card = document.createElement('div');
                card.className = `postflop-card ${c.rank}`;
                card.innerHTML = `
                    <div class="postflop-title">
                        <span>${c.title}</span>
                        <span class="hand-badge">${c.rank.toUpperCase()}</span>
                    </div>
                    <div class="timeline">
                        <div class="time-node"><span class="time-label">FLOP</span><span class="size-val ${c.flop}">${c.flopTxt}</span></div>
                        <div class="time-node"><span class="time-label">TURN</span><span class="size-val ${c.turn}">${c.turnTxt}</span></div>
                        <div class="time-node"><span class="time-label">RIVER</span><span class="size-val ${c.river}">${c.riverTxt}</span></div>
                    </div>
                    <div class="postflop-desc">${c.desc}</div>
                `;
                container.appendChild(card);
            });

            // 2. ディフェンダーセクション
            const defTitle = document.createElement('div');
            defTitle.className = 'section-title';
            defTitle.style.marginTop = '20px';
            defTitle.innerText = '🛡️ ディフェンダー側（主導権なし / 3BET・4BETにコールした側）';
            container.appendChild(defTitle);

            data.defender.forEach(c => {
                const card = document.createElement('div');
                card.className = 'postflop-card defender';
                card.innerHTML = `
                    <div class="postflop-title">
                        <span>【対面状況】 ${c.act}</span>
                        <span class="hand-badge">DEFEND</span>
                    </div>
                    <div class="timeline">
                        <div class="time-node"><span class="time-label">FLOP</span><span class="size-val ${c.f}">${c.fTxt}</span></div>
                        <div class="time-node"><span class="time-label">TURN</span><span class="size-val ${c.t}">${c.tTxt}</span></div>
                        <div class="time-node"><span class="time-label">RIVER</span><span class="size-val ${c.r}">${c.rTxt}</span></div>
                    </div>
                    <div class="postflop-desc">${c.desc}</div>
                `;
                container.appendChild(card);
            });
        }

        // 初期レンダリング
        updateDisplay();
    </script>
